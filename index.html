<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .card {
            width: 100%;
            max-width: 350px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            line-height: 0;
        }
        
        .card-image {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .action-area {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
            background: white;
        }
        
        .btn {
            display: block;
            text-align: center;
            padding: 16px;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-main {
            background: #6c2d91;
            color: white;
            box-shadow: 0 5px 15px rgba(108, 45, 145, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #6c2d91;
            border: 2px solid #6c2d91;
        }
        
        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #bbb;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="BusinessCard.png" alt="Business Card" class="card-image">

        <div class="action-area">
            <a href="https://drive.google.com/uc?export=download&id=1UYH1B2v1RZLsnULqS4G3pAL8idYtSelc" class="btn btn-main">📥 儲存聯絡資訊</a>

            <button onclick="copyContactText()" class="btn btn-secondary">📋 複製文字資訊</button>
        </div>
    </div>

    <div class="footer-text">TAIWAN MOBILE | UED</div>

    <script id="js-encoded-data" type="text/plain">

    <script>
        function copyContactText() {
            // 1. 取得 Base64 解碼後的文字
            const encoded = document.getElementById('js-encoded-data').textContent.trim();
            const text = decodeURIComponent(atob(encoded).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            // 2. 嘗試使用現代 Clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        alert("✅ 聯絡資訊已複製！");
                    })
                    .catch(() => {
                        fallbackCopy(text);
                    }); // 失敗則進入備用方案
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            // 解決妳說的「畫面上只有圖片無法選取」的問題
            // 我們動態建立一個漂亮的滿版 overlay，把文字噴出來讓對方選
            const overlay = document.createElement("div");
            overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; padding:20px; box-sizing:border-box;";

            const info = document.createElement("p");
            info.textContent = "請長按下方文字框全選並複製：";
            info.style = "margin-bottom:15px; font-size:16px;";

            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style = "width:100%; height:200px; padding:15px; border-radius:10px; font-size:16px; border:none;";

            const closeBtn = document.createElement("button");
            closeBtn.textContent = "關閉視窗";
            closeBtn.style = "margin-top:20px; padding:10px 30px; border-radius:20px; border:none; background:#6c2d91; color:white; font-size:16px;";
            closeBtn.onclick = function() {
                document.body.removeChild(overlay);
            };

            overlay.appendChild(info);
            overlay.appendChild(textArea);
            overlay.appendChild(closeBtn);
            document.body.appendChild(overlay);

            // 自動幫忙選取文字
            textArea.select();
            textArea.setSelectionRange(0, 99999); // 針對手機版

            // 嘗試執行最後一次自動複製
            try {
                document.execCommand('copy');
                alert("✅ 已自動選取文字，請點擊「複製」或手動拷貝。");
            } catch (err) {
                // 如果連 execCommand 都掛了，至少對方現在看得到文字可以選了
            }
        }
    </script>
</body>

</html>
