<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .card {
            width: 100%;
            max-width: 350px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            line-height: 0;
        }
        
        .card-image {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .action-area {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
            background: white;
        }
        
        .btn {
            display: block;
            text-align: center;
            padding: 16px;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-main {
            background: #6c2d91;
            color: white;
            box-shadow: 0 5px 15px rgba(108, 45, 145, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #6c2d91;
            border: 2px solid #6c2d91;
        }
        
        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #bbb;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="BusinessCard.png" alt="Business Card" class="card-image">

        <div class="action-area">
            <a href="https://drive.google.com/uc?export=download&id=1UYH1B2v1RZLsnULqS4G3pAL8idYtSelc" class="btn btn-main">📥 儲存聯絡資訊</a>

            <button onclick="copyContactText()" class="btn btn-secondary">📋 複製文字資訊</button>
        </div>
    </div>

    <div class="footer-text">TAIWAN MOBILE | UED</div>

    <script id="js-encoded-data" type="text/plain">5by16ZuF6LKXIFlhQ2hlbiBDSEFORwrlj7DngaPlpKflm6TlpKfogqHku73pyInpmZDlhazlj7QgLyDmlb44L2N5aqS6auU6itpIHwgU2VuaW9yIEFkbWluaXN0cmF0b3IK6Zu76Kmx77yaKDAyKTY2MzgtNjg4OCAjMTE1NTEKRW1haWzvvJpZYUNoZW5DaGFuZ0B0YWl3YW5tb2JpbGUuY29tCuWcsOWdgO+8mjExMDcy5Y+w5YyX5biC5L+h576p5Y2A54it5bug6LevODjomZ8xMkY=</script>

    <script>
        /**
         * 1. 安全解碼函數
         * 處理 Base64 並支援 UTF-8 中文，同時濾掉可能導致 atob 崩潰的換行與空格
         */
        function getDecodedData() {
            try {
                const raw = document.getElementById('js-encoded-data').textContent;
                // 重要：濾掉所有空白字元與換行，防止 atob 報錯
                const encoded = raw.replace(/\s/g, '');

                // 執行解碼並轉換為 UTF-8 字串
                return decodeURIComponent(atob(encoded).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (e) {
                console.error("Base64 解碼失敗:", e);
                return "資料解析錯誤，請聯繫管理員。";
            }
        }

        /**
         * 2. 複製功能主程式
         * 包含現代 API 與針對手機瀏覽器 (Line/Chrome) 的相容性覆蓋
         */
        function copyContactText() {
            const text = getDecodedData();

            // 優先嘗試現代 Clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        alert("✅ 聯絡資訊已複製！");
                    })
                    .catch(() => {
                        fallbackCopy(text);
                    });
            } else {
                fallbackCopy(text);
            }
        }

        /**
         * 3. 備用複製方案 (Fallback)
         * 解決手機瀏覽器權限被擋，或「畫面只有圖片無法選取」的痛點
         */
        function fallbackCopy(text) {
            // 建立一個全螢幕遮罩層
            const overlay = document.createElement("div");
            overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; padding:20px; box-sizing:border-box; font-family:sans-serif;";

            const info = document.createElement("p");
            info.textContent = "請長按下方框內文字全選並複製：";
            info.style = "margin-bottom:15px; font-size:16px; font-weight:bold;";

            const textArea = document.createElement("textarea");
            textArea.value = text;
            // 設定選取區域樣式，確保在手機上好操作
            textArea.style = "width:100%; height:180px; padding:15px; border-radius:12px; font-size:16px; border:none; color:#333; background:#fff; line-height:1.5;";
            textArea.readOnly = true;

            const closeBtn = document.createElement("button");
            closeBtn.textContent = "關閉視窗";
            closeBtn.style = "margin-top:25px; padding:12px 40px; border-radius:30px; border:none; background:#6c2d91; color:white; font-size:16px; font-weight:bold; cursor:pointer;";
            closeBtn.onclick = function() {
                document.body.removeChild(overlay);
            };

            overlay.appendChild(info);
            overlay.appendChild(textArea);
            overlay.appendChild(closeBtn);
            document.body.appendChild(overlay);

            // 自動聚焦並選取
            textArea.focus();
            textArea.select();
            textArea.setSelectionRange(0, 9999); // 針對 iOS 的相容性

            // 最後嘗試一次指令複製
            try {
                document.execCommand('copy');
                alert("✅ 已自動選取文字，請點擊「複製」或手動拷貝。");
            } catch (err) {
                // 即使自動複製失敗，現在對方也看得到文字框可以手動選取了
            }
        }

        // 針對 Google Drive 下載的導向 (保持原本邏輯)
        function handleSave() {
            window.location.href = "https://drive.google.com/uc?export=download&id=1UYH1B2v1RZLsnULqS4G3pAL8idYtSelc";
        }
    </script>
</body>

</html>
