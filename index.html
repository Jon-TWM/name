<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .card {
            width: 100%;
            max-width: 350px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            line-height: 0;
        }
        
        .card-image {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .action-area {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
            background: white;
        }
        
        .btn {
            display: block;
            text-align: center;
            padding: 16px;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-main {
            background: #6c2d91;
            color: white;
            box-shadow: 0 5px 15px rgba(108, 45, 145, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #6c2d91;
            border: 2px solid #6c2d91;
        }
        
        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #bbb;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="BusinessCard.png" alt="Business Card" class="card-image">

        <div class="action-area">
            <a href="https://drive.google.com/uc?export=download&id=1UYH1B2v1RZLsnULqS4G3pAL8idYtSelc" class="btn btn-main">📥 儲存聯絡資訊</a>

            <button onclick="copyContactText()" class="btn btn-secondary">📋 複製文字資訊</button>
        </div>
    </div>

    <div class="footer-text">TAIWAN MOBILE | UED</div>

    <script id="js-encoded-data" type="text/plain">

    <script>
        function copyContactText() {
            const encoded = document.getElementById('js-encoded-data').textContent.trim();
            // 處理中文 Base64 解碼
            const text = decodeURIComponent(atob(encoded).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => alert("✅ 聯絡資訊已複製！"));
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert("✅ 聯絡資訊已複製！");
                } catch (err) {
                    alert("複製失敗，請手動選取");
                }
                document.body.removeChild(textArea);
            }
        }
    </script>
</body>

</html>
