<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .card {
            width: 100%;
            max-width: 350px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            line-height: 0;
        }
        
        .card-image {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .action-area {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
            background: white;
        }
        
        .btn {
            display: block;
            text-align: center;
            padding: 16px;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-main {
            background: #6c2d91;
            color: white;
            box-shadow: 0 5px 15px rgba(108, 45, 145, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #6c2d91;
            border: 2px solid #6c2d91;
        }
        
        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #bbb;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="BusinessCard.png" alt="Business Card" class="card-image">

        <div class="action-area">
            <a href="https://drive.google.com/uc?export=download&id=1UYH1B2v1RZLsnULqS4G3pAL8idYtSelc" onclick="return handleSaveClick(event)" class="btn btn-main">📥 儲存聯絡資訊</a>

            <button onclick="copyContactText()" class="btn btn-secondary">📋 複製文字資訊</button>
        </div>
    </div>

    <div class="footer-text">TAIWAN MOBILE | UED</div>

    <script id="js-encoded-data" type="text/plain">5by16ZuF6LKeIFlhQ2hlbiBDSEFORwrlj7DngaPlpKflk6XlpKfogqHku73mnInpmZDlhazlj7ggLyDmlbjkvY3lqpLpq5TomZUKKDAyKTY2MzgtNjg4OCAjMTE1NTEKMDkyOTkwNzAxOQpZYUNoZW5DaGFuZ0B0YWl3YW5tb2JpbGUuY29tCjExMDcy5Y+w5YyX5biC5L+h576p5Y2A6I+45bug6LevODjomZ8xMkYKMTJGLCBOby44OCwgWWFuQ2hhbmcgUmQuLCBYaW5ZaSBEaXN0LiwgVGFpcGVpIENpdHksIFRhaXdhbihSLk8uQy4p</script>

    <script>
        /**
         * 1. 穩健的 UTF-8 Base64 解碼器
         * 解決手機版 Chrome/Line 對於中文 Base64 解碼報錯的問題
         */
        function getDecodedData() {
            try {
                const raw = document.getElementById('js-encoded-data').textContent;
                // 濾掉所有換行與空白
                const b64 = raw.replace(/\s/g, '');

                // 使用 Uint8Array 處理位元組，這是目前最穩、不會讓中文報錯的做法
                const binString = atob(b64);
                const bytes = new Uint8Array(binString.length);
                for (let i = 0; i < binString.length; i++) {
                    bytes[i] = binString.charCodeAt(i);
                }
                // 使用 TextDecoder 強制以 UTF-8 解析
                return new TextDecoder().decode(bytes);
            } catch (e) {
                console.error("解碼失敗詳情:", e);
                // 萬一 TextDecoder 不支援，使用舊版相容做法
                try {
                    return decodeURIComponent(escape(atob(document.getElementById('js-encoded-data').textContent.replace(/\s/g, ''))));
                } catch (e2) {
                    return "解析失敗，請長按圖片資訊手動輸入";
                }
            }
        }

        /**
         * 2. 複製功能
         * 策略：先嘗試同步 execCommand（在使用者手勢 context 內最可靠），
         *       失敗則改用 async Clipboard API，兩者都失敗才顯示 Overlay 讓使用者手動複製。
         */
        function copyContactText() {
            const text = getDecodedData();

            if (text.includes("解析失敗")) {
                alert(text);
                return;
            }

            // 方法一：建立隱藏 textarea，在同步手勢 context 內用 execCommand 複製
            const ta = document.createElement("textarea");
            ta.value = text;
            ta.style.cssText = "position:fixed; top:-9999px; left:-9999px; opacity:0;";
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            ta.setSelectionRange(0, 9999);

            let syncSuccess = false;
            try {
                syncSuccess = document.execCommand('copy');
            } catch (e) {}
            document.body.removeChild(ta);

            if (syncSuccess) {
                alert("✅ 聯絡資訊已複製！");
                return;
            }

            // 方法二：async Clipboard API（HTTPS + 非 LINE 內建瀏覽器時可用）
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        alert("✅ 聯絡資訊已複製！");
                    })
                    .catch(() => {
                        fallbackCopy(text);
                    });
            } else {
                fallbackCopy(text);
            }
        }

        /**
         * 3. 備用複製方案 (Overlay 模式)
         * 顯示可選取的文字框，讓使用者長按手動複製。
         * 不再偽裝自動複製成功，避免誤導。
         */
        function fallbackCopy(text) {
            const overlay = document.createElement("div");
            overlay.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; padding:20px; box-sizing:border-box;";

            const info = document.createElement("p");
            info.textContent = "請長按下方框內文字，全選後複製：";
            info.style.cssText = "margin-bottom:15px; font-weight:bold; text-align:center;";

            const textArea = document.createElement("textarea");
            textArea.value = text;
            // 不設 readOnly，讓手機瀏覽器可以觸發選取選單
            textArea.style.cssText = "width:100%; height:180px; padding:15px; border-radius:12px; font-size:16px; border:none; background:#fff; color:#333;";

            const closeBtn = document.createElement("button");
            closeBtn.textContent = "關閉視窗";
            closeBtn.style.cssText = "margin-top:25px; padding:12px 40px; border-radius:30px; border:none; background:#6c2d91; color:white; font-size:16px; font-weight:bold;";
            closeBtn.onclick = function() {
                document.body.removeChild(overlay);
            };

            overlay.appendChild(info);
            overlay.appendChild(textArea);
            overlay.appendChild(closeBtn);
            document.body.appendChild(overlay);

            // 自動全選，讓使用者看到文字已被選取
            textArea.focus();
            textArea.select();
            textArea.setSelectionRange(0, 9999);
        }

        function isLINEBrowser() {
            return /\bLine\b/i.test(navigator.userAgent);
        }

        function handleSaveClick(event) {
            if (isLINEBrowser()) {
                event.preventDefault();
                const overlay = document.createElement("div");
                overlay.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; padding:28px; box-sizing:border-box; text-align:center;";

                overlay.innerHTML = `
                    <p style="font-size:18px; font-weight:bold; margin-bottom:12px;">請用外部瀏覽器開啟</p>
                    <p style="font-size:14px; line-height:1.7; margin-bottom:24px; color:#ddd;">
                        LINE 內建瀏覽器無法下載檔案。<br>
                        請點右上角 <strong>「⋯」→「在瀏覽器中開啟」</strong>，<br>再點「儲存聯絡資訊」即可下載。
                    </p>
                    <button style="padding:12px 40px; border-radius:30px; border:none; background:#6c2d91; color:white; font-size:16px; font-weight:bold;">了解</button>
                `;
                overlay.querySelector("button").onclick = () => document.body.removeChild(overlay);
                document.body.appendChild(overlay);
                return false;
            }
            return true;
        }
    </script>
</body>

</html>
